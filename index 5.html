<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Script Rehearsal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        h1, h2 { text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pdf-section { background-color: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #007aff; }
        input[type="file"] { margin-top: 10px; width: 100%; }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-size: 16px; margin-top: 10px;}
        button { width: 100%; padding: 12px; background-color: #007aff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:disabled { background-color: #99ccff; }
        select { width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; margin-top: 10px; }
        .box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #f0f0f2; min-height: 50px; text-align: center; }
        #status { font-weight: bold; color: #007aff; margin-top: 10px; }
        #pdfStatus { font-size: 14px; color: #333; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Line Reader App</h1>
    
    <div id="setup-section">
        
        <div class="pdf-section">
            <h3>1. Upload Script PDF</h3>
            <p style="font-size: 13px; margin: 0;">Upload a PDF to automatically extract lines.</p>
            <input type="file" id="pdfInput" accept="application/pdf">
            <div id="pdfStatus"></div>
        </div>

        <h3>2. Review / Edit Script</h3>
        <p style="font-size: 12px; color: #666; margin-top: 0;">Check for errors, delete page numbers, then load.</p>
        <textarea id="scriptInput">DETECTIVE: Where were you on the night of the 14th?
SUSPECT: I was at home watching television.</textarea>
        
        <button id="loadBtn">Load Script & Find Characters</button>
        
        <div id="charSelectContainer" style="display:none;">
            <h3>3. Select YOUR Character:</h3>
            <select id="charSelect"></select>
            <button id="startBtn">Start Rehearsal</button>
        </div>
    </div>

    <div id="rehearsal-section" style="display:none;">
        <h2 id="roleTitle">Playing: </h2>
        <div class="box">
            <strong id="speakerName">Speaker:</strong>
            <p id="lineDisplay">Press start to begin...</p>
        </div>
        <div id="status">Ready</div>
        <button id="quitBtn" style="background-color: #ff3b30; margin-top: 20px;">Quit Rehearsal</button>
    </div>
</div>

<script>
    // --- PDF.JS SETUP ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    document.getElementById('pdfInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const statusEl = document.getElementById('pdfStatus');
        statusEl.textContent = "Extracting text... please wait.";
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            
            // Loop through every page in the PDF
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let lastY = -1;
                let pageText = "";
                
                // Reconstruct lines based on vertical positioning
                textContent.items.forEach(item => {
                    if (lastY !== item.transform[5] && lastY !== -1) {
                        pageText += "\n";
                    }
                    pageText += item.str;
                    lastY = item.transform[5];
                });
                fullText += pageText + "\n";
            }
            
            // Send the raw text to our smart parser
            const formattedScript = parsePDFText(fullText);
            document.getElementById('scriptInput').value = formattedScript;
            statusEl.textContent = "✅ PDF Loaded! Review the text box below.";
            statusEl.style.color = "green";
        } catch (error) {
            console.error(error);
            statusEl.textContent = "❌ Error reading PDF.";
            statusEl.style.color = "red";
        }
    });

    // --- SMART SCRIPT PARSER ---
    function parsePDFText(rawText) {
        // Break into lines and remove empty ones
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let formatted = [];
        let currentCharacter = "";
        let currentLine = "";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            
            // 1. Skip obvious stage directions wrapped entirely in parentheses
            if (line.startsWith('(') && line.endsWith(')')) continue;
            
            // 2. Determine if the line is a character name 
            // Rule: Mostly uppercase letters, no lowercase letters, relatively short.
            const isAllCaps = /^[^a-z]+$/.test(line) && /[A-Z]/.test(line);
            
            if (isAllCaps && line.length < 35) {
                // Save the previous character's line before starting a new one
                if (currentCharacter && currentLine) {
                    formatted.push(`${currentCharacter}: ${currentLine.trim()}`);
                }
                currentCharacter = line; // Set new active character
                currentLine = "";        // Reset dialogue
            } else {
                // 3. It's dialogue. Append it to the current character.
                if (currentCharacter) {
                    // Remove inline stage directions (e.g., "Hi (waves) there" becomes "Hi there")
                    let cleanLine = line.replace(/\([^)]+\)/g, '').trim();
                    if (cleanLine) {
                        currentLine += cleanLine + " ";
                    }
                }
            }
        }
        
        // Push the very last line
        if (currentCharacter && currentLine) {
            formatted.push(`${currentCharacter}: ${currentLine.trim()}`);
        }
        
        return formatted.join('\n');
    }

    // --- EXISTING APP LOGIC ---
    let scriptLines = [];
    let currentLineIndex = 0;
    let myCharacter = "";
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
    }

    if (localStorage.getItem('savedScript')) {
        document.getElementById('scriptInput').value = localStorage.getItem('savedScript');
    }

    document.getElementById('loadBtn').addEventListener('click', () => {
        const text = document.getElementById('scriptInput').value;
        localStorage.setItem('savedScript', text);
        
        const lines = text.split('\n');
        scriptLines = [];
        const characters = new Set();

        lines.forEach(line => {
            if (line.includes(':')) {
                const parts = line.split(':');
                const charName = parts[0].trim().toUpperCase();
                const dialogue = parts.slice(1).join(':').trim();
                if (charName && dialogue) {
                    scriptLines.push({ character: charName, line: dialogue });
                    characters.add(charName);
                }
            }
        });

        if (scriptLines.length === 0) {
            alert("Could not detect any lines. Make sure you use the 'NAME: Line' format.");
            return;
        }

        const select = document.getElementById('charSelect');
        select.innerHTML = '';
        characters.forEach(char => {
            const opt = document.createElement('option');
            opt.value = char;
            opt.textContent = char;
            select.appendChild(opt);
        });

        document.getElementById('charSelectContainer').style.display = 'block';
    });

    document.getElementById('startBtn').addEventListener('click', () => {
        myCharacter = document.getElementById('charSelect').value;
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('rehearsal-section').style.display = 'block';
        document.getElementById('roleTitle').textContent = "Playing: " + myCharacter;
        currentLineIndex = 0;
        nextLine();
    });

    document.getElementById('quitBtn').addEventListener('click', () => {
        window.speechSynthesis.cancel();
        if (recognition) recognition.abort();
        document.getElementById('setup-section').style.display = 'block';
        document.getElementById('rehearsal-section').style.display = 'none';
    });

    function nextLine() {
        if (currentLineIndex >= scriptLines.length) {
            document.getElementById('speakerName').textContent = "Scene Complete!";
            document.getElementById('lineDisplay').textContent = "Great job nailing your lines!";
            document.getElementById('status').textContent = "Done";
            return;
        }

        const currentData = scriptLines[currentLineIndex];
        
        if (currentData.character !== myCharacter) {
            document.getElementById('speakerName').textContent = currentData.character;
            document.getElementById('lineDisplay').textContent = currentData.line;
            document.getElementById('status').textContent = "Speaking cue...";

            const utterance = new SpeechSynthesisUtterance(currentData.line);
            utterance.onend = () => {
                currentLineIndex++;
                nextLine();
            };
            window.speechSynthesis.speak(utterance);
        } else {
            document.getElementById('speakerName').textContent = "YOU (" + myCharacter + ")";
            document.getElementById('lineDisplay').textContent = "(Say your line now)";
            document.getElementById('status').textContent = "Listening...";

            if (!recognition) {
                alert("Speech recognition not supported on this browser/device.");
                return;
            }

            recognition.start();

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                const targetText = currentData.line.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

                if (spokenText.includes(targetText) || targetText.includes(spokenText) || similarity(spokenText, targetText) > 0.6) {
                    document.getElementById('status').textContent = "✅ Correct!";
                    currentLineIndex++;
                    setTimeout(nextLine, 1000);
                } else {
                    document.getElementById('status').textContent = "❌ Try again. You said: '" + spokenText + "'";
                    setTimeout(() => { recognition.start(); document.getElementById('status').textContent = "Listening..."; }, 2000);
                }
            };

            recognition.onerror = (err) => {
                if (err.error === 'no-speech') {
                    recognition.start();
                }
            };
        }
    }

    function similarity(s1, s2) {
        let longer = s1; let shorter = s2;
        if (s1.length < s2.length) { longer = s2; shorter = s1; }
        let longerLength = longer.length;
        if (longerLength == 0) { return 1.0; }
        return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
    }

    function editDistance(s1, s2) {
        s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
        let costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else {
                    if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) != s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
</script>

</body>
</html>
